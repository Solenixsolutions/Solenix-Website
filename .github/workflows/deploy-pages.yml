name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate SEO / AI files from products.js
        run: node solenix-website/tools/gen-seo.js
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: solenix-website
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
